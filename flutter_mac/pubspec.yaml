name: fromchat_mac
description: FromChat desktop client for macOS (Flutter).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  cryptography: ^2.7.0
  pinenacl: ^0.6.0
  http_parser: ^4.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  sqflite_common_ffi_web: ^1.0.0
  sqlite3_flutter_libs: ^0.5.32
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  file_picker: ^9.2.1
  desktop_drop: ^0.5.0
  url_launcher: ^6.3.1
  collection: ^1.19.1
  intl: ^0.20.2
  livekit_client: ^2.4.1
  window_manager: ^0.4.3
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/google_sans_regular.ttf
          weight: 400
        - asset: assets/fonts/google_sans_italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/google_sans_medium.ttf
          weight: 500
        - asset: assets/fonts/google_sans_medium_italic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/google_sans_semibold.ttf
          weight: 600
        - asset: assets/fonts/google_sans_semibold_italic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/google_sans_bold.ttf
          weight: 700
        - asset: assets/fonts/google_sans_bold_italic.ttf
          weight: 700
          style: italic
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat_latin.ttf
          weight: 700
        - asset: assets/fonts/montserrat_latin_ext.ttf
          weight: 700
        - asset: assets/fonts/montserrat_cyrillic.ttf
          weight: 700
        - asset: assets/fonts/montserrat_cyrillic_ext.ttf
          weight: 700
        - asset: assets/fonts/montserrat_vietnamese.ttf
          weight: 700
